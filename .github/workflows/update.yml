name: Actualizar pronósticos

# Modo BAJO DEMANDA: se dispara manualmente (botón "Run workflow"), desde el bot
# de Telegram o desde OpenClaw vía la API. No hay cron por defecto para no gastar
# los minutos gratis de Actions en repos privados.
#
# ¿Quieres que despierte solo cada cierto tiempo? Descomenta el bloque "schedule"
# (en repo PÚBLICO los minutos son ilimitados; en privado vigila el límite mensual).
on:
  workflow_dispatch:
    inputs:
      retrain:
        description: "Re-entrenar el modelo completo (más lento). Si no, solo actualiza resultados."
        type: boolean
        default: false
  # schedule:
  #   - cron: "0 * * * *"    # cada hora (descomenta si lo quieres automático)

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Instalar dependencias
        run: pip install -r pipeline/requirements.txt

      - name: Retrain completo
        if: ${{ inputs.retrain }}
        run: |
          python -m pipeline.update --refresh-history || true
          python -m pipeline.run

      - name: Update incremental (resultados + re-pronóstico)
        if: ${{ !inputs.retrain }}
        run: python -m pipeline.update

      - name: Commit y push si hay cambios
        run: |
          git config user.name "polla-bot"
          git config user.email "actions@github.com"
          git add frontend/public/data pipeline/data/results_2026.json pipeline/reports pipeline/models pipeline/data/matches_seed.json
          if ! git diff --cached --quiet; then
            git commit -m "data: actualización automática $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "Sin cambios"
          fi
